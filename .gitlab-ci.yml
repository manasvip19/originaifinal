image: python:3.11

stages:
  - lint
  - type_check
  - test
  - coverage
  - security

lint:
  stage: lint
  script:
    - echo "ruff check ."

type_check:
  stage: type_check
  script:
    - echo "mypy ."

test:
  stage: test
  script:
    - echo "pytest"

coverage:
  stage: coverage
  script:
    - echo "pytest --cov=."

security:
  stage: security
  script:
    - echo "pip-audit"
    - echo "bandit -r ."