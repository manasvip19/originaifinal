<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OriginAI | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .settings-card{max-width:900px;margin:60px auto;padding:28px;background:rgba(255,255,255,0.03);border-radius:12px}
        .form-row{margin-bottom:14px}
        label{display:block;margin-bottom:6px}
        input, select{width:100%;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
        .small{font-size:13px;color:rgba(255,255,255,0.7)}
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>

    <nav class="navbar">
        <div class="logo">OriginAI</div>
        <div class="nav-links">
            <a href="/" data-i18n="nav.home">Home</a>
            <a href="/analyzer" data-i18n="nav.analyzer">Analyzer</a>
            <a href="/dashboard" data-i18n="nav.dashboard">Dashboard</a>
            <a href="/investor-report" data-i18n="nav.report">Investor Report</a>
            <a href="/pitchdeck" data-i18n="nav.pitch">Pitch Deck</a>
        </div>
        <div class="nav-buttons">
            <select class="lang-select" title="Language" style="margin-left:8px">
                <option value="en">English</option>
                <option value="te">తెలుగు</option>
                <option value="hi">हिन्दी</option>
                <option value="ta">தமிழ்</option>
            </select>
        </div>
    </nav>

    <section class="settings-card">

        <h2 data-i18n="settings.title">AI Settings</h2>

        <div class="form-row">
            <label for="provider" data-i18n="settings.provider_label">AI Provider</label>
            <select id="provider">
                <option value="openai" data-i18n="settings.provider.openai">OpenAI</option>
                <option value="gemini" data-i18n="settings.provider.gemini">Gemini</option>
                <option value="ollama" data-i18n="settings.provider.ollama">Ollama (Local)</option>
            </select>
            <div class="small" data-i18n="settings.provider_help">Select the AI provider to use for requests.</div>
        </div>

        <div class="form-row" id="keyRow">
            <label for="apiKey" data-i18n="settings.api_key">API Key / Token</label>
            <input id="apiKey" placeholder="Enter your API key">
            <div class="small" id="keyHelp" data-i18n="settings.api_help">Keys are stored locally in your browser and are never uploaded to this server.</div>
        </div>

        <div class="form-row" id="ollamaRow" style="display:none">
            <label for="ollamaUrl" data-i18n="settings.ollama_url">Ollama URL</label>
            <input id="ollamaUrl" placeholder="http://localhost:11434">
            <label for="ollamaModel" data-i18n="settings.ollama_model">Model</label>
            <select id="ollamaModel">
                <option value="llama3" data-i18n="settings.model.llama3">llama3</option>
                <option value="mistral" data-i18n="settings.model.mistral">mistral</option>
                <option value="gemma" data-i18n="settings.model.gemma">gemma</option>
                <option value="phi3" data-i18n="settings.model.phi3">phi3</option>
            </select>
            <div class="small" data-i18n="settings.ollama_help">Configure local Ollama endpoint and model.</div>
        </div>

        <div style="display:flex;gap:12px;margin-top:12px">
            <button class="btn-primary" id="saveBtn" data-i18n="settings.save">Save Settings</button>
            <button class="btn-secondary" id="testBtn" data-i18n="settings.test">Test Connection</button>
        </div>

        <div id="status" style="margin-top:12px" class="small"></div>

    </section>

    <script src="/static/js/settings.js"></script>
    <script src="/static/js/i18n.js"></script>
</body>

</html>
